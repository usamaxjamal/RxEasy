<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RxEasy — Signing in...</title>
<!-- SEC-03 FIX: CSP to reduce XSS attack surface -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src  'self' 'unsafe-inline';
  style-src   'self' 'unsafe-inline';
  connect-src 'self' https://*.supabase.co;
  img-src     'self' data: blob:;
  frame-src   'none';
  object-src  'none';
">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060d1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif}
.wrap{text-align:center;color:#e8f0f8;padding:20px}
.spin{width:44px;height:44px;border:3px solid rgba(20,184,138,.2);border-top-color:#14b88a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.txt{font-size:.9rem;color:rgba(232,240,248,.7);margin-bottom:8px}
.sub{font-size:.72rem;color:rgba(232,240,248,.35)}
.err{color:#ff6b6b;font-size:.78rem;margin-top:14px;line-height:1.6;display:none}
.back{display:none;margin-top:16px;background:#14b88a;color:#051a0a;border:none;border-radius:10px;padding:10px 24px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div class="wrap">
<div class="spin" id="spinner"></div>
<div class="txt" id="msg">Signing you in...</div>
<div class="sub" id="sub">Please wait a moment</div>
<div class="err" id="err"></div>
<button class="back" id="backBtn" onclick="window.location.href='login.html'">← Back to Login</button>
</div>
<!-- SEC-01 FIX: config.js provides window.__RXEASY_CONFIG__ -->
<script src="config.js"></script>
<script src="assets/js/callback-1.js"></script>
</body>
</html>
