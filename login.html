<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>RxEasy — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#060d1a;--card:#0d1e35;--border:rgba(201,168,76,.18);--border2:rgba(255,255,255,.07);--teal:#14b88a;--tx:#e8f0f8;--tx2:rgba(232,240,248,.55);--tx3:rgba(232,240,248,.3);--err:#ff6b6b;--inp:#060d1a}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 24px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:24px}
.logo-box{width:60px;height:60px;border-radius:14px;background:linear-gradient(145deg,rgba(20,184,138,.15),rgba(201,168,76,.1));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.logo-rx{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:#fff}
.logo-rx span{color:var(--teal)}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:#fff}
.logo-name span{color:var(--teal)}
.logo-sub{font-size:.63rem;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.tabs{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;margin-bottom:22px;border:1px solid var(--border2)}
.tab{flex:1;padding:8px;border-radius:8px;font-size:.78rem;font-weight:600;text-align:center;cursor:pointer;color:var(--tx2);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.on{background:rgba(255,255,255,.08);color:var(--tx)}
.field{margin-bottom:13px}
.lbl{display:block;font-size:.67rem;font-weight:700;color:var(--tx2);letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px}
.inp{background:var(--inp);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;font-size:.85rem;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;width:100%}
.inp:focus{border-color:var(--teal)}
.inp::placeholder{color:var(--tx3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:block;width:100%;background:linear-gradient(135deg,#14b88a,#0da87a);color:#051a0a;border:none;border-radius:11px;padding:13px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:8px;margin:13px 0}
.div-line{flex:1;height:1px;background:var(--border2)}
.div-txt{font-size:.63rem;color:var(--tx3)}
.gbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:11px;padding:12px;font-size:.82rem;font-weight:600;color:var(--tx);cursor:pointer;font-family:'DM Sans',sans-serif}
.msg{padding:10px 13px;border-radius:9px;font-size:.75rem;font-weight:500;display:none;margin-bottom:12px}
.msg.show{display:block}
.err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:var(--err)}
.ok{background:rgba(20,184,138,.1);border:1px solid rgba(20,184,138,.25);color:var(--teal)}
.hint{font-size:.65rem;color:var(--tx3);text-align:center;margin-top:10px}
.hint a{color:var(--teal);text-decoration:none}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(5,26,10,.3);border-top-color:#051a0a;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:18px;font-size:.6rem;color:var(--tx3)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box"><div class="logo-rx">R<span>x</span></div></div>
    <div class="logo-name">Rx<span>Easy</span></div>
    <div class="logo-sub">Pakistan GP Platform</div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tl" onclick="showTab('login')">Login</button>
    <button class="tab" id="tr" onclick="showTab('reg')">Register</button>
  </div>

  <div id="em" class="msg err"></div>
  <div id="om" class="msg ok"></div>

  <!-- LOGIN -->
  <div id="lf">
    <div class="field"><label class="lbl">Email</label><input class="inp" type="email" id="le" placeholder="doctor@email.com"></div>
    <div class="field"><label class="lbl">Password</label><input class="inp" type="password" id="lp" placeholder="••••••••"></div>
    <button class="btn" id="lb" onclick="doLogin()">Login to RxEasy</button>
    <div class="divider"><div class="div-line"></div><div class="div-txt">or</div><div class="div-line"></div></div>
    <button class="gbtn" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="hint"><a href="#" onclick="doReset(event)">Forgot password?</a></div>
  </div>

  <!-- REGISTER -->
  <div id="rf" style="display:none">
    <div class="field"><label class="lbl">Full Name *</label><input class="inp" type="text" id="rn" placeholder="Dr. Your Name"></div>
    <div class="row2">
      <div class="field"><label class="lbl">Qualification</label><select class="inp" id="rq"><option>MBBS</option><option>BDS</option><option>MBBS, FCPS</option><option>MBBS, MCPS</option><option>MD</option></select></div>
      <div class="field"><label class="lbl">City</label><input class="inp" type="text" id="rc" placeholder="Lahore"></div>
    </div>
    <div class="field"><label class="lbl">PMDC No. (optional)</label><input class="inp" type="text" id="rp" placeholder="PMDC-XXXXX"></div>
    <div class="field"><label class="lbl">Email *</label><input class="inp" type="email" id="re" placeholder="doctor@email.com"></div>
    <div class="field"><label class="lbl">Password * (min 8 chars)</label><input class="inp" type="password" id="rw" placeholder="••••••••"></div>
    <button class="btn" id="rb" onclick="doRegister()">Create Doctor Account</button>
    <div class="divider"><div class="div-line"></div><div class="div-txt">or</div><div class="div-line"></div></div>
    <button class="gbtn" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Register with Google
    </button>
  </div>
</div>
<div class="footer">RxEasy · Dr. Usama Jamal MBBS · PMDC Registered</div>

<script>
var SB = 'https://epvfbxzuziihhcaaaizp.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwdmZieHp1emlpaGhjYWFhaXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQ2MzIsImV4cCI6MjA4OTY4MDYzMn0.Yq7vX7TWzQ-VXwHl9E4lwHhL-gbzSMKUYcd2CLT8rKw';

function se(m){var e=document.getElementById('em');e.textContent=m;e.className='msg err show';document.getElementById('om').className='msg ok';}
function so(m){var e=document.getElementById('om');e.textContent=m;e.className='msg ok show';document.getElementById('em').className='msg err';}
function cm(){document.getElementById('em').className='msg err';document.getElementById('om').className='msg ok';}

function showTab(t){
  cm();
  if(t==='login'){
    document.getElementById('lf').style.display='block';
    document.getElementById('rf').style.display='none';
    document.getElementById('tl').className='tab on';
    document.getElementById('tr').className='tab';
  } else {
    document.getElementById('lf').style.display='none';
    document.getElementById('rf').style.display='block';
    document.getElementById('tl').className='tab';
    document.getElementById('tr').className='tab on';
  }
}

// Check already logged in
window.onload = function() {
  try {
    var s = JSON.parse(localStorage.getItem('sb_session')||'null');
    if(s && s.access_token) window.location.href = 'index.html';
  } catch(e){}
};

async function doLogin() {
  cm();
  var email = document.getElementById('le').value.trim();
  var pass  = document.getElementById('lp').value;
  if(!email||!pass){se('Enter email and password');return;}
  var btn = document.getElementById('lb');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Logging in...';
  try {
    var r = await fetch(SB+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY},
      body:JSON.stringify({email:email,password:pass})
    });
    var d = await r.json();
    if(!r.ok){se(d.error_description||d.msg||'Login failed');btn.disabled=false;btn.innerHTML='Login to RxEasy';return;}
    localStorage.setItem('sb_session',JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token||'',user:d.user||{}}));
    so('Welcome! Loading...');
    setTimeout(function(){window.location.href='index.html';},800);
  } catch(e){se('Network error');btn.disabled=false;btn.innerHTML='Login to RxEasy';}
}

async function doRegister() {
  cm();
  var name=document.getElementById('rn').value.trim();
  var email=document.getElementById('re').value.trim();
  var pass=document.getElementById('rw').value;
  var qual=document.getElementById('rq').value;
  var city=document.getElementById('rc').value.trim();
  var pmdc=document.getElementById('rp').value.trim();
  if(!name){se('Enter your full name');return;}
  if(!email){se('Enter your email');return;}
  if(!pass||pass.length<8){se('Password must be at least 8 characters');return;}
  var btn=document.getElementById('rb');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Creating account...';
  try {
    var r = await fetch(SB+'/auth/v1/signup',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':KEY},
      body:JSON.stringify({email:email,password:pass,data:{full_name:name}})
    });
    var d = await r.json();
    if(!r.ok){se(d.error_description||d.msg||'Registration failed');btn.disabled=false;btn.innerHTML='Create Doctor Account';return;}
    if(d.user && d.access_token){
      // Create profile
      await fetch(SB+'/rest/v1/doctor_profiles',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+d.access_token,'Prefer':'return=minimal'},
        body:JSON.stringify({id:d.user.id,full_name:name,email:email,qualification:qual,city:city||null,pmdc_number:pmdc||null,is_approved:true,is_admin:false})
      });
      localStorage.setItem('sb_session',JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token||'',user:d.user}));
      so('Account created! Redirecting...');
      setTimeout(function(){window.location.href='index.html';},1000);
    } else {
      so('Check your email to verify, then login.');
      btn.disabled=false;btn.innerHTML='Create Doctor Account';
    }
  } catch(e){se('Network error');btn.disabled=false;btn.innerHTML='Create Doctor Account';}
}

function doGoogle() {
  window.location.href = SB+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent('https://rxeasy.vercel.app/callback.html');
}

async function doReset(e) {
  e.preventDefault(); cm();
  var email=document.getElementById('le').value.trim();
  if(!email){se('Enter your email first');return;}
  var r=await fetch(SB+'/auth/v1/recover',{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email:email})});
  if(r.ok) so('Reset email sent! Check your inbox.');
  else se('Could not send reset email.');
}

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(document.getElementById('lf').style.display!=='none') doLogin();
  else doRegister();
});
</script>
</body>
</html>
