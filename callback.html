<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxEasy — Signing in...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060d1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif}
.wrap{text-align:center;color:#e8f0f8}
.spin{width:40px;height:40px;border:3px solid rgba(20,184,138,.2);border-top-color:#14b88a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.txt{font-size:.9rem;color:rgba(232,240,248,.6)}
.err{color:#ff6b6b;font-size:.82rem;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="spin"></div>
  <div class="txt">Signing you in...</div>
  <div class="err" id="err"></div>
</div>

<script>
const SB_URL = 'https://epvfbxzuziihhcaaaizp.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwdmZieHp1emlpaGhjYWFhaXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQ2MzIsImV4cCI6MjA4OTY4MDYzMn0.Yq7vX7TWzQ-VXwHl9E4lwHhL-gbzSMKUYcd2CLT8rKw';

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
  document.querySelector('.txt').textContent = 'Sign in failed';
  setTimeout(() => window.location.href = 'login.html', 3000);
}

function saveAndRedirect(access_token, refresh_token, user_data) {
  try {
    const parts = access_token.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    const session = {
      access_token,
      refresh_token: refresh_token || '',
      user: {
        id: user_data?.id || payload.sub,
        email: user_data?.email || payload.email,
        user_metadata: {
          full_name: user_data?.user_metadata?.full_name ||
                     user_data?.user_metadata?.name ||
                     payload.user_metadata?.full_name ||
                     payload.email || ''
        }
      }
    };
    localStorage.setItem('sb_session', JSON.stringify(session));

    // Create doctor profile if Google login (new user)
    createProfileIfNeeded(session);

    window.location.replace('index.html');
  } catch(e) {
    showErr('Could not save session: ' + e.message);
  }
}

async function createProfileIfNeeded(session) {
  try {
    // Check if profile exists
    const check = await fetch(SB_URL + '/rest/v1/doctor_profiles?id=eq.' + session.user.id, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + session.access_token }
    });
    const existing = await check.json();
    if (existing && existing.length > 0) return; // Already exists

    // Create new profile for Google user
    await fetch(SB_URL + '/rest/v1/doctor_profiles', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + session.access_token,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        id: session.user.id,
        full_name: session.user.user_metadata.full_name || session.user.email,
        email: session.user.email,
        qualification: 'MBBS',
        is_approved: true,
        is_admin: false
      })
    });
  } catch(e) { console.warn('Profile create error:', e); }
}

async function handleCallback() {
  // Method 1: Token in URL hash
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    if (access_token) {
      saveAndRedirect(access_token, refresh_token, null);
      return;
    }
  }

  // Method 2: Code in URL params (PKCE)
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    try {
      const res = await fetch(SB_URL + '/auth/v1/token?grant_type=pkce', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
        body: JSON.stringify({ auth_code: code })
      });
      const data = await res.json();
      if (data.access_token) {
        saveAndRedirect(data.access_token, data.refresh_token, data.user);
        return;
      }
      showErr(data.error_description || 'Code exchange failed');
    } catch(e) {
      showErr('Network error: ' + e.message);
    }
    return;
  }

  // No token or code found
  showErr('No authentication data found. Redirecting...');
}

handleCallback();
</script>
</body>
</html>
